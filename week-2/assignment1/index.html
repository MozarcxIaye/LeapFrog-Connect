<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 2 (Assignment 1) | Weather App with Vanila JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <div class="title-bar">
            <span>Weather.app</span>

            </section>
