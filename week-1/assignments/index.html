<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment | Week 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>First Handson on HTML, CSS and JS</h1>
    </header>
    
    <main>

        <div class="title-section">
            <h1 id="title">Score Helper (Practice App)</h1>
            <p class="description">Enter a score from 0 to 100, then click Calculate Grade.</p>
        </div>

        <div class="input-section">
            <label for="input-score">Score:</label>
            <input type="number" id="score-input" min="0" max="100" value="0" />
            <button type="button" id="calc-btn">Calculate Grade</button>
        </div>

        <div class="result-section">
            <p id="result">Result appears here.</p>
            <p id="summary">Array summary appears hers.</p>
        </div>

    </main>
    

    <script src="main.js"></script>
</body>
</html>
